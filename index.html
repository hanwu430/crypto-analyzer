<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanwuFight - 加密货币技术分析平台</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        // CDN fallback: 如果unpkg加载失败，尝试jsdelivr
        if (typeof LightweightCharts === 'undefined') {
            document.write('<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"><\/script>');
        }
    </script>
</head>
<body>
    <!-- 粒子首页 -->
    <div id="particle-page" class="page active">
        <canvas id="particle-canvas"></canvas>
        <div class="particle-overlay">
            <header class="header">
                <h1 class="title">HanwuFight</h1>
                <p class="subtitle">点击粒子查看加密货币K线技术分析</p>
            </header>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索币种... (如 BTC, ETH, SOL)" autocomplete="off">
                <div id="search-results" class="search-results hidden"></div>
            </div>
        </div>
        <div class="loading-overlay" id="particle-loading">
            <div class="spinner"></div>
            <p>正在加载市场数据...</p>
        </div>
    </div>

    <!-- 分析页 -->
    <div id="analysis-page" class="page">
        <div class="analysis-header">
            <button id="btn-back" class="btn-back">← 返回</button>
            <div class="symbol-info">
                <h2 id="analysis-symbol">BTC/USDT</h2>
                <span id="analysis-price" class="price">--</span>
                <span id="analysis-change" class="change">--</span>
            </div>
            <div class="timeframes">
                <button class="tf-btn" data-interval="15m">15分钟</button>
                <button class="tf-btn" data-interval="1h">1小时</button>
                <button class="tf-btn active" data-interval="4h">4小时</button>
                <button class="tf-btn" data-interval="1d">日线</button>
                <button class="tf-btn" data-interval="1w">周线</button>
            </div>
        </div>
        <div class="analysis-content">
            <div class="chart-container">
                <div id="chart-main" class="chart-panel"></div>
                <div id="chart-volume" class="chart-panel"></div>
                <div id="chart-macd" class="chart-panel"></div>
                <div id="chart-rsi" class="chart-panel"></div>
            </div>
            <div class="analysis-sidebar">
                <div class="sidebar-section">
                    <h3>📊 技术指标分析</h3>
                    <button id="btn-refresh" class="btn-refresh">🔄 刷新分析</button>
                </div>
                <div id="indicators-panel" class="indicators-panel">
                    <div class="indicator-item skeleton">
                        <span class="indicator-name">加载中...</span>
                    </div>
                </div>
                <div id="recommendation-panel" class="recommendation-panel">
                    <div class="rec-score skeleton">--</div>
                    <div class="rec-verdict skeleton">等待数据...</div>
                    <div class="rec-advice skeleton">点击刷新获取分析建议</div>
                </div>
            </div>
        </div>
        <div class="loading-overlay hidden" id="analysis-loading">
            <div class="spinner"></div>
            <p>正在加载K线数据...</p>
        </div>
    </div>

    <!-- Toast提示 -->
    <div id="toast" class="toast hidden"></div>

    <script src="js/api.js"></script>
    <script src="js/indicators.js"></script>
    <script src="js/analysis.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
